<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#00674F" />

    <!-- Primary SEO -->
    <title>Jahani Mart - Premium Products at Best Prices | Online Shopping</title>
    <meta name="description" content="Jahani Mart - Shop premium quality products at unbeatable prices. Free delivery across India. 10,000+ products, easy returns, secure payments." />
    <meta name="keywords" content="jahani mart, online shopping, buy online india, best prices, free delivery, import export, premium products" />
    <meta name="author" content="Jahani Mart" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://jahani-mart.onrender.com/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Jahani Mart" />
    <meta property="og:title" content="Jahani Mart - Premium Products at Best Prices" />
    <meta property="og:description" content="Shop premium quality products at unbeatable prices. Free delivery across India." />
    <meta property="og:image" content="https://jahani-mart.onrender.com/manu%20ettn%20logo%20.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://jahani-mart.onrender.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jahani Mart - Premium Products at Best Prices" />
    <meta name="twitter:description" content="Shop premium quality products at unbeatable prices. Free delivery across India." />
    <meta name="twitter:image" content="https://jahani-mart.onrender.com/manu%20ettn%20logo%20.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/manu%20ettn%20logo%20.png" />
    <link rel="apple-touch-icon" href="/manu%20ettn%20logo%20.png" />

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Jahani Mart",
        "url": "https://jahani-mart.onrender.com",
        "logo": "https://jahani-mart.onrender.com/manu%20ettn%20logo%20.png",
        "description": "Premium import export business offering quality products at best prices with free delivery across India.",
        "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "areaServed": "IN"
        }
    }
    </script>

    <!-- Website JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Jahani Mart",
        "url": "https://jahani-mart.onrender.com",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://jahani-mart.onrender.com/products?search={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .font-heading { font-family: 'Playfair Display', serif; }
        .font-body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
</body>

</html>
